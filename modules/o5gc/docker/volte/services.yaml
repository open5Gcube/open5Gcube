services:
  base:
    init: true
    privileged: true
    env_file: [ "${ENV_FILE}" ]
    environment:
      - IMS_DOMAIN=ims.mnc${MNC03}.mcc${MCC}.3gppnetwork.org
      - EPC_DOMAIN=epc.mnc${MNC03}.mcc${MCC}.3gppnetwork.org
      - REGISTRATION_EXPIRES=3600
    volumes:
      - ${DOCKER}/volte:/mnt/volte:ro
    labels:
      o5gc.stack: ${O5GC_STACK}
      o5gc.webui.priority: ${WEBUI_PRIO_VOLTE}
    profiles: [ "volte" ]

  kamailio:
    extends:
      service: base
    image: o5gc/volte-kamailio
    entrypoint: [ "/mnt/volte/kamailio/entrypoint.sh" ]
    healthcheck:
      test: /bin/bash -c "TERM=dumb kamctl monitor 1 | grep -q up_since || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
    dns: ${VOLTE_DNS_IP_ADDR}

  dns:
    extends:
      service: base
    image: o5gc/volte-dns
    container_name: volte-dns
    entrypoint: [ "/mnt/volte/dns/entrypoint.sh" ]
    networks:
      corenet:
        ipv4_address: ${VOLTE_DNS_IP_ADDR}
    labels:
      o5gc.stack: ${O5GC_STACK}

  icscf:
    extends:
      service: kamailio
    container_name: icscf
    command: icscf
    networks:
      corenet:
        ipv4_address: ${ICSCF_IP_ADDR}
    depends_on:
      mysql:
        condition: service_healthy
      pyhss:
        condition: service_started
      volte-dns:
        condition: service_started

  pcscf:
    extends:
      service: kamailio
    container_name: pcscf
    command: pcscf
    networks:
      corenet:
        ipv4_address: ${PCSCF_IP_ADDR}
    depends_on:
      icscf:
        condition: service_started
      mysql:
        condition: service_healthy
      rtpengine:
        condition: service_started
      scscf:
        condition: service_started
      volte-dns:
        condition: service_started

  scscf:
    extends:
      service: kamailio
    container_name: scscf
    command: scscf
    networks:
      corenet:
        ipv4_address: ${SCSCF_IP_ADDR}
    depends_on:
      mysql:
        condition: service_healthy
      pyhss:
        condition: service_healthy
      volte-dns:
        condition: service_started

  smsc:
    extends:
      service: kamailio
    container_name: smsc
    command: smsc
    networks:
      corenet:
        ipv4_address: ${SMSC_IP_ADDR}
    depends_on:
      mysql:
        condition: service_healthy
      volte-dns:
        condition: service_started
    profiles: [ "smsc" ]
    dns: ${VOLTE_DNS_IP_ADDR}

  rtpengine:
    extends:
      service: base
    image: o5gc/volte-rtpengine
    container_name: rtpengine
    entrypoint: [ "/mnt/volte/rtpengine/entrypoint.sh" ]
    networks:
      corenet:
        ipv4_address: ${RTPENGINE_IP_ADDR}
    dns: ${VOLTE_DNS_IP_ADDR}

  pyhss:
    extends:
      service: base
    image: o5gc/volte-pyhss
    container_name: pyhss
    entrypoint: [ "/mnt/volte/pyhss/entrypoint.sh" ]
    volumes:
      - ${MODULES}/base/docker/o5gc/core-init.sh:/mnt/o5gc/core-init.sh:ro
      - ${BASE}/etc:/mnt/o5gc/etc:ro
    networks:
      corenet:
        ipv4_address: ${VOLTE_HSS_IP_ADDR}
      o5gc:
        gw_priority: 1
    depends_on: [ mysql, volte-dns ]
    healthcheck:
      test: /bin/bash -c "/mnt/volte/pyhss/healthcheck.sh"
      start_period: 15s
      start_interval: 1s
      interval: 10s
      timeout: 1s
      retries: 2
    dns: ${VOLTE_DNS_IP_ADDR}
