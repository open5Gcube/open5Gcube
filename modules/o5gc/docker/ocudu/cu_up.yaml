cu_up:
  e1ap:
    addrs: ${CU_CP_IP_ADDR}
    bind_addrs: ${CU_UP_IP_ADDR}
  ngu:
    socket:
      - bind_addr: ${CU_UP_CORENET_IP_ADDR}
  f1u:
    socket:
      - bind_addr: ${CU_UP_IP_ADDR}

log:
  filename: stdout
  all_level: info

pcap:
  e1ap_enable: false
  e1ap_filename: /tmp/cu_up_e1ap.pcap
